# pack.schema.toml
#
# Annotated reference for the weave pack manifest format.
# This file documents every field, its type, whether it's required,
# and what it does.
#
# This is not a functional file — it's documentation.
# Generate a real pack.toml with: weave init

# ─────────────────────────────────────────────
# [pack] — required
# Core metadata about the pack.
# ─────────────────────────────────────────────

[pack]

# Required. Lowercase letters, numbers, and hyphens only.
# Must be unique in the registry if publishing.
# Example: "webdev", "rust-embedded", "databases"
name = "my-pack"

# Required. Follows semver: MAJOR.MINOR.PATCH
# Increment PATCH for fixes, MINOR for new servers/commands, MAJOR for breaking changes.
version = "1.0.0"

# Required. One or two sentences describing what this pack does.
description = "A short description of what this pack provides."

# Required for publishing. One or more authors.
authors = ["yourname"]

# Optional. SPDX license identifier.
license = "MIT"

# Optional. URL to the pack repository.
repository = "https://github.com/yourname/my-pack"

# Optional. List of keywords for registry search.
# Keep them lowercase and general: ["web", "browser", "git", "databases"]
keywords = []

# Optional. Minimum supported weave version.
min_tool_version = "0.1.0"

# ─────────────────────────────────────────────
# [dependencies] — optional
# Other packs this pack depends on.
# Keys are pack names; values are semver version requirements.
# ─────────────────────────────────────────────

[dependencies]

# "@core/filesystem" = "^1.0"
# "@core/git" = ">=2.0, <3.0"

# ─────────────────────────────────────────────
# [[servers]] — optional, repeatable
# Each entry defines one MCP server to register.
# ─────────────────────────────────────────────

[[servers]]

# Required. The name used to identify this server in the pack.
# Must be unique within the pack.
name = "github"

# Optional. Package type used for installation metadata.
# Examples: "npm", "pip", "cargo", "brew", "binary".
# This is informational in v0.1 and may be used by future installers.
type = "npm"

# Optional. Package identifier if using a package manager.
package = "@modelcontextprotocol/server-github"

# Required for stdio transport. The executable to run.
# Use "npx" for npm-distributed servers, "uvx" for Python, full paths for local binaries.
# Not used for http transport — use `url` instead.
command = "npx"

# Optional. Arguments passed to the command. Only used for stdio transport.
args = ["-y", "@modelcontextprotocol/server-github"]

# Optional. Transport type. Values: "stdio" or "http".
# Stdio is the default. Use "http" for remote MCP servers accessed via URL.
transport = "stdio"

# Required for http transport. The endpoint URL of the remote MCP server.
# Not used for stdio transport — use `command` instead.
# url = "https://example.com/mcp"

# Optional. HTTP headers sent with every request. Only used for http transport.
# Useful for authentication (e.g. Bearer tokens via env var references).
# [servers.headers]
# Authorization = "Bearer ${MY_API_KEY}"

# Optional. Namespace used to prefix tools and avoid conflicts.
namespace = "github"

# Optional. Declared tool list for conflict detection and filtering.
tools = ["create_pr", "list_issues"]

# Optional. Environment variable metadata for this server.
# Values are objects, not secrets. The installer writes env var references only.
[servers.env.GITHUB_TOKEN]
required = true
secret = true
description = "GitHub PAT with repo scope"

# ─────────────────────────────────────────────
# [extensions] — optional
# CLI-specific configuration that only applies to the target CLI.
# Adapters ignore extensions they don't understand.
# ─────────────────────────────────────────────

[extensions.claude_code]
# hooks.PostToolUse = { matcher = "Write|Edit", command = "prettier --write \"$CLAUDE_PROJECT_DIR\"" }

[extensions.gemini_cli]
# trust = false

[extensions.codex_cli]
# startup_timeout_sec = 30

# ─────────────────────────────────────────────
# [targets] — optional
# Which CLIs this pack supports.
# Defaults to true for all supported CLIs if omitted.
# Set to false to explicitly exclude a CLI.
# ─────────────────────────────────────────────

[targets]
claude_code = true
gemini_cli = true
codex_cli = true

# ─────────────────────────────────────────────
# File layout
#
# In addition to pack.toml, a pack directory may contain:
#
# mcp/
#   servers.toml       Alternative to [[servers]] in pack.toml for long definitions.
#                      If present, merged with any servers defined inline.
#
# commands/
#   <name>.md          Slash command files for Claude Code. Installed into ~/.claude/commands/
#                      with namespaced filenames: <pack>__<name>.md
#
# skills/
#   <name>.md          Skill files for Codex CLI. Installed into ~/.codex/skills/
#                      with namespaced filenames: <pack>__<name>.md
#
# prompts/
#   claude.md          Appended to Claude Code's system prompt file.
#   gemini.md          Appended to Gemini CLI's system prompt file.
#   codex.md           Appended to Codex CLI's system prompt file.
#   system.md          Fallback prompt applied when a CLI-specific file is absent.
#
# settings/
#   claude.json        Deep-merged into Claude Code's settings.
#   gemini.json        Deep-merged into Gemini CLI's settings.
#   codex.toml         Merged (top-level keys) into Codex CLI's config.toml.
#                      Also accepts codex.json as fallback.
#
# hooks/
#   Hooks are deferred to v0.3. If enabled later, they will require explicit opt-in.
#
# ─────────────────────────────────────────────
