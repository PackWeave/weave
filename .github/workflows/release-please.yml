#
# Automates changelog generation and release PRs using Release Please.
#
# When conventional commits land on main, Release Please opens (or updates)
# a release PR that bumps the version in Cargo.toml, updates CHANGELOG.md,
# and — once merged — creates a version tag (v*). The existing release.yml
# workflow picks up the tag and builds binaries / publishes the release.
#
# IMPORTANT: Uses RELEASE_TOKEN (a PAT) instead of GITHUB_TOKEN so that the
# tag creation triggers release.yml. GitHub's anti-recursion rule prevents
# GITHUB_TOKEN-created events from triggering other workflows.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_TOKEN }}

      # Keep the release PR branch in sync with main even when a push
      # contains only non-releasable commits (docs:, test:, ci:, etc.).
      # Release Please only force-pushes its branch when the changelog
      # changes, leaving the PR BEHIND main otherwise.
      - name: Sync release PR branch with main
        if: steps.release.outputs.releases_created != 'true' && steps.release.outputs.prs_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          PR=$(gh pr list --label "autorelease: pending" --state open --json number --jq '.[0].number')
          if [ -n "$PR" ]; then
            gh api repos/${{ github.repository }}/pulls/$PR/update-branch \
              --method PUT -f update_method="rebase" 2>/dev/null || true
          fi
