name: Stale

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC daily
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been open for 14 days with no activity. It will be
            closed in 7 days unless there is further activity. If this is still
            relevant, please leave a comment.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still
            relevant.
          stale-pr-message: >
            This pull request has been open for 14 days with no activity. It
            will be closed in 7 days unless there is further activity.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if the work is
            resumed.
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,security,autorelease: pending'
          exempt-all-assignees: true
