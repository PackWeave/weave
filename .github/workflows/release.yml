#
# Runs on version tags (v*). Builds release binaries for all supported
# targets, packages them as .tar.gz archives, and uploads them to the
# GitHub Release created by Release Please.
#
# cargo-binstall uses these assets automatically. The asset naming convention
# and [package.metadata.binstall] in Cargo.toml must stay in sync.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.4.2). Uses --ref tag if omitted.'
        required: false

permissions:
  contents: read   # default for all jobs; release job overrides to write

env:
  CARGO_TERM_COLOR: always
  # Resolve tag from either push event or manual workflow_dispatch input.
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest   # Apple Silicon runner — native arm64 build
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        if: matrix.use_cross
        run: command -v cross || cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary and generate checksum
        shell: bash
        run: |
          ARCHIVE="packweave-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" weave
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packweave-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            *.tar.gz
            *.tar.gz.sha256

  publish:
    name: Publish to crates.io
    needs: build
    if: github.repository == 'PackWeave/weave'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CRATE_VERSION)"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    name: Update Homebrew formula
    needs: release
    if: github.repository == 'PackWeave/weave'
    runs-on: ubuntu-latest
    steps:
      - name: Update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          TARBALL="https://github.com/PackWeave/weave/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$TARBALL" | sha256sum | cut -d ' ' -f1)

          # Clone the tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/PackWeave/homebrew-tap.git" tap
          cd tap

          # Update url and sha256 in the formula
          sed -i "s|url \".*\"|url \"${TARBALL}\"|" Formula/weave.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/weave.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/weave.rb
          git commit -m "weave ${VERSION}"
          git push
